name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: krosscares
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d krosscares"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/krosscares?schema=public
      REDIS_URL: redis://localhost:6379
      APP_URL: http://localhost:3000
      SESSION_SECRET: ci-secret
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: kross-assets
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_FROM: noreply@krosscares.local
      INTERNAL_CRON_SECRET: local-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:dev -- --name ci_init
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run build
